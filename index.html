<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>პაემანი? 💖</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --pink: #ff5fa2;
      --hot-pink: #ff2f8d;
      --soft-pink: #ffd5e8;
      --purple: #6d3bff;
      --dark: #12071f;
      --border: rgba(255, 255, 255, 0.22);
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.38);
      --glass: rgba(255, 255, 255, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100%;
      font-family: "Noto Sans Georgian", system-ui, sans-serif;
      background:
        radial-gradient(circle at 18% 12%, rgba(255, 95, 162, 0.38), transparent 28%),
        radial-gradient(circle at 84% 20%, rgba(109, 59, 255, 0.32), transparent 28%),
        radial-gradient(circle at 50% 92%, rgba(255, 193, 220, 0.18), transparent 32%),
        linear-gradient(145deg, #160720 0%, #281044 45%, #12071f 100%);
      color: white;
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .stars, .bg-hearts, #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .stars { z-index: 0; }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 999px;
      animation: twinkle 2.8s ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.18; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1.6); }
    }

    .bg-hearts { z-index: 0; overflow: hidden; }

    .bg-heart {
      position: absolute;
      bottom: -60px;
      font-size: clamp(16px, 4vw, 26px);
      opacity: 0;
      animation: floatHeart linear infinite;
      filter: drop-shadow(0 0 12px rgba(255, 95, 162, 0.5));
    }

    .bg-heart:nth-child(1) { left: 6%; animation-duration: 9s; animation-delay: 0s; }
    .bg-heart:nth-child(2) { left: 18%; animation-duration: 11s; animation-delay: 1s; }
    .bg-heart:nth-child(3) { left: 31%; animation-duration: 8s; animation-delay: 2.2s; }
    .bg-heart:nth-child(4) { left: 43%; animation-duration: 10s; animation-delay: 0.6s; }
    .bg-heart:nth-child(5) { left: 57%; animation-duration: 12s; animation-delay: 1.7s; }
    .bg-heart:nth-child(6) { left: 70%; animation-duration: 8.5s; animation-delay: 2.7s; }
    .bg-heart:nth-child(7) { left: 82%; animation-duration: 10.5s; animation-delay: 1.3s; }
    .bg-heart:nth-child(8) { left: 92%; animation-duration: 9.5s; animation-delay: 3s; }

    @keyframes floatHeart {
      0% { transform: translateY(0) rotate(0deg) scale(0.55); opacity: 0; }
      16% { opacity: 0.72; }
      84% { opacity: 0.72; }
      100% { transform: translateY(-112vh) rotate(540deg) scale(1.18); opacity: 0; }
    }

    #confetti-canvas { z-index: 20; }

    .screen {
      position: relative;
      z-index: 2;
      width: min(100%, 440px);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }

    .screen.hidden {
      opacity: 0;
      transform: scale(0.92) translateY(16px);
      pointer-events: none;
    }

    .card {
      position: relative;
      width: 100%;
      max-height: calc(100svh - 28px);
      overflow-y: auto;
      overflow-x: hidden;
      padding: 22px 18px 18px;
      text-align: center;
      border: 1px solid var(--border);
      border-radius: 34px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.08)),
        rgba(255, 255, 255, 0.08);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      pointer-events: none;
    }

    h1 {
      font-size: clamp(25px, 7vw, 38px);
      line-height: 1.25;
      font-weight: 900;
      letter-spacing: -0.5px;
      text-shadow: 0 12px 34px rgba(0, 0, 0, 0.5);
      animation: fadeDown 0.75s 0.07s ease both;
    }

    .name-glow {
      color: var(--soft-pink);
      text-shadow: 0 0 22px rgba(255, 95, 162, 0.95), 0 0 52px rgba(255, 47, 141, 0.65);
      animation: glow 1.7s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { filter: drop-shadow(0 0 3px rgba(255, 95, 162, 0.45)); }
      to { filter: drop-shadow(0 0 18px rgba(255, 95, 162, 0.95)); }
    }

    .subtitle {
      margin: 10px auto 16px;
      max-width: 310px;
      color: rgba(255, 255, 255, 0.68);
      font-size: clamp(13px, 3.4vw, 15px);
      line-height: 1.6;
      animation: fadeDown 0.75s 0.14s ease both;
    }

    .photo-frame {
      position: relative;
      width: min(100%, 330px);
      aspect-ratio: 1.45 / 1;
      margin: 0 auto 16px;
      padding: 8px;
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.28), rgba(255, 95, 162, 0.12));
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.32), 0 0 44px rgba(255, 95, 162, 0.16);
      animation: popIn 0.8s 0.2s cubic-bezier(.2, .9, .2, 1.25) both, floatSmall 3.2s ease-in-out infinite;
    }

    .main-photo {
      width: 100%;
      height: 100%;
      border-radius: 22px;
      background: url("720552435_2150396695503480_1052200278410007004_n.png") center / contain no-repeat;
      background-color: rgba(0,0,0,0.08);
    }

    .photo-sticker {
      position: absolute;
      right: -10px;
      top: -12px;
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: linear-gradient(135deg, #fff, #ffd6e8);
      color: #ff2f8d;
      font-size: 26px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.24);
      animation: stickerWiggle 1.8s ease-in-out infinite;
    }

    @keyframes stickerWiggle {
      0%, 100% { transform: rotate(-8deg) scale(1); }
      50% { transform: rotate(8deg) scale(1.08); }
    }

    .question-text {
      margin: 2px 0 12px;
      color: rgba(255, 255, 255, 0.82);
      font-size: 14px;
      font-weight: 700;
      animation: fadeDown 0.75s 0.29s ease both;
    }

    .choices-area {
      position: relative;
      width: 100%;
      min-height: 230px;
      animation: fadeUp 0.7s 0.34s ease both;
    }

    .image-row {
      position: relative;
      z-index: 3;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 16px;
      width: 100%;
    }

    .answer-card {
      position: relative;
      width: min(42vw, 142px);
      max-width: 142px;
      padding: 0;
      border: 0;
      border-radius: 28px;
      background: transparent;
      box-shadow: none;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 0.22s ease, filter 0.22s ease, left 0.24s ease, top 0.24s ease;
      animation: floatSmall 3s ease-in-out infinite;
      -webkit-tap-highlight-color: transparent;
    }

    .answer-card:active { transform: scale(0.92); }

    .answer-card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: block;
      object-fit: cover;
      border-radius: 21px;
      pointer-events: none;
      filter: drop-shadow(0 16px 24px rgba(0, 0, 0, 0.28));
    }

    .answer-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 74px;
      margin-top: 9px;
      padding: 8px 16px;
      border-radius: 999px;
      color: #fff;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 0.3px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      background: rgba(18, 7, 31, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      pointer-events: none;
    }

    #yesChoice .answer-label { background: linear-gradient(135deg, rgba(255, 120, 180, 0.92), rgba(255, 47, 141, 0.92)); }
    #noChoice .answer-label { background: linear-gradient(135deg, rgba(125, 124, 255, 0.92), rgba(67, 32, 185, 0.92)); }

    #noChoice.running { position: absolute; z-index: 10; animation: none; }
    #noChoice.tease { animation: noShake 0.36s ease both; }

    @keyframes noShake {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      25% { transform: translateX(-6px) rotate(-4deg); }
      50% { transform: translateX(6px) rotate(4deg); }
      75% { transform: translateX(-4px) rotate(-2deg); }
    }

    @keyframes floatSmall {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }

    .cute-message {
      min-height: 20px;
      margin-top: 8px;
      color: rgba(255, 213, 232, 0.9);
      font-size: 12px;
      font-weight: 800;
      animation: fadeUp 0.35s ease both;
    }

    /* ===== CONFIRMATION / DATE PLANNER ===== */
    .confirmation {
      display: none;
      z-index: 4;
      width: min(100%, 440px);
      animation: confirmAppear 0.72s cubic-bezier(.2, .9, .2, 1.25) both;
    }

    .confirmation .card { padding-top: 24px; }

    .big-heart {
      width: 82px; height: 82px;
      margin: 0 auto 12px;
      display: grid; place-items: center;
      border-radius: 30px;
      background: linear-gradient(135deg, #fff, #ffd1e5);
      color: #ff2f8d;
      font-size: 44px;
      box-shadow: 0 20px 50px rgba(255, 47, 141, 0.28);
      animation: heartBeat 0.9s ease-in-out infinite;
    }

    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      30% { transform: scale(1.12); }
      55% { transform: scale(0.98); }
    }

    .confirmation h2 {
      font-size: clamp(28px, 7.3vw, 42px);
      line-height: 1.15;
      font-weight: 900;
      text-shadow: 0 14px 36px rgba(0, 0, 0, 0.45);
    }

    .confirm-sub {
      max-width: 340px;
      margin: 10px auto 14px;
      color: rgba(255, 255, 255, 0.72);
      font-size: 14px;
      line-height: 1.55;
    }

    /* ===== PRETTY DATE PLANNER ===== */
    .planner {
      margin-top: 14px;
      display: grid;
      gap: 16px;
    }

    .planner-section {
      background: rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 14px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .section-title {
      font-size: 13px;
      font-weight: 900;
      color: var(--soft-pink);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .location-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .location-btn {
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 14px 8px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 800;
      color: rgba(255,255,255,0.85);
      background: rgba(255,255,255,0.05);
      cursor: pointer;
      transition: all 0.2s ease;
      line-height: 1.4;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .location-btn .loc-icon { font-size: 22px; }
    .location-btn .loc-label { font-size: 12px; }
    .location-btn:active { transform: scale(0.94); }

    .location-btn.selected {
      background: linear-gradient(135deg, rgba(255, 120, 180, 0.9), rgba(255, 47, 141, 0.85), rgba(201, 32, 255, 0.5));
      border-color: rgba(255,255,255,0.5);
      color: #fff;
      box-shadow: 0 8px 24px rgba(255, 47, 141, 0.25);
    }

    .dt-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .dt-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .dt-field label {
      font-size: 12px;
      font-weight: 800;
      color: rgba(255,255,255,0.6);
      text-align: left;
    }

    .dt-input {
      width: 100%;
      min-height: 48px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 0 12px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      color: white;
      background: rgba(255,255,255,0.08);
      outline: none;
      color-scheme: dark;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
      transition: border-color 0.2s;
    }

    .dt-input:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px rgba(255, 95, 162, 0.15);
    }

    .save-btn {
      border: none;
      width: 100%;
      padding: 16px 18px;
      border-radius: 999px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 900;
      color: white;
      background: linear-gradient(135deg, #ff78b4, #ff2f8d 55%, #c920ff);
      box-shadow: 0 16px 34px rgba(255, 47, 141, 0.30);
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .save-btn:active:not(:disabled) { transform: scale(0.96); }

    .status-text {
      min-height: 20px;
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
      line-height: 1.5;
    }

    .success-box {
      display: none;
      margin-top: 14px;
      padding: 18px;
      border-radius: 20px;
      background: rgba(37, 211, 102, 0.08);
      border: 1px solid rgba(37, 211, 102, 0.3);
      text-align: center;
    }

    .success-box .tick { font-size: 36px; margin-bottom: 6px; }
    .success-box .saved-note {
      font-size: 13px;
      font-weight: 800;
      line-height: 1.7;
      color: rgba(255,255,255,0.9);
    }
    .success-box .saved-note span { color: var(--soft-pink); }

    .celebration-gif {
      display: none;
      width: min(100%, 280px);
      aspect-ratio: 1.6 / 1;
      margin: 12px auto 0;
      border-radius: 24px;
      background: url("https://media1.tenor.com/m/2VprHA868S8AAAAC/yummy-desserts-desserts-milk-mocha.gif") center / cover no-repeat;
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.32);
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.84); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes confirmAppear {
      from { opacity: 0; transform: scale(0.82) translateY(18px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @media (max-width: 390px) {
      body { padding: 12px; }
      .card { border-radius: 28px; padding: 18px 14px 15px; }
      .photo-frame { border-radius: 24px; }
      .main-photo { border-radius: 18px; }
      .choices-area { min-height: 210px; }
      .image-row { gap: 10px; }
      .answer-card { width: min(42vw, 126px); border-radius: 22px; }
      .answer-card img { border-radius: 17px; }
      .answer-label { margin-top: 7px; padding: 7px 14px; font-size: 13px; }
      .location-grid { gap: 8px; }
      .location-btn { padding: 12px 6px; }
      .planner-section { padding: 12px; }
    }

    @media (max-height: 760px) {
      .card { padding-top: 16px; }
      .subtitle { margin-bottom: 10px; }
      .photo-frame { width: min(100%, 270px); margin-bottom: 10px; }
      .choices-area { min-height: 190px; }
      .answer-card { width: min(38vw, 116px); }
      .big-heart { width: 68px; height: 68px; font-size: 36px; margin-bottom: 8px; }
      .confirm-sub { margin: 8px auto 10px; }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars" aria-hidden="true"></div>

  <div class="bg-hearts" aria-hidden="true">
    <span class="bg-heart">💖</span><span class="bg-heart">💗</span><span class="bg-heart">💕</span>
    <span class="bg-heart">💘</span><span class="bg-heart">💞</span><span class="bg-heart">💖</span>
    <span class="bg-heart">💗</span><span class="bg-heart">💕</span>
  </div>

  <canvas id="confetti-canvas"></canvas>

  <!-- ===== MAIN SCREEN ===== -->
  <main class="screen" id="mainScreen">
    <section class="card">
      <h1><span class="name-glow">მაკუნა</span>,<br />წამოხვალ ჩემთან პაემანზე? 💫</h1>
      <p class="subtitle">მხოლოდ ერთი სწორი პასუხია... მაგრამ მაინც გაძლევ არჩევანს 😌💖</p>

      <div class="photo-frame">
        <div class="main-photo" role="img" aria-label="cute image"></div>
        <div class="photo-sticker">💌</div>
      </div>

      <p class="question-text">რას მიპასუხებ? 🥹</p>

      <div class="choices-area" id="choicesArea">
        <div class="image-row" id="imageRow">
          <button class="answer-card" id="yesChoice" type="button" aria-label="კი">
            <img src="ki.jpg" alt="კი" />
            <span class="answer-label">კი</span>
          </button>
          <button class="answer-card" id="noChoice" type="button" aria-label="არა">
            <img src="ara.jpg" alt="არა" />
            <span class="answer-label" id="noLabel">არა</span>
          </button>
        </div>
      </div>

      <div class="cute-message" id="cuteMessage"></div>
    </section>
  </main>

  <!-- ===== CONFIRMATION / DATE PLANNER ===== -->
  <section class="confirmation" id="confirmation">
    <div class="card">
      <div class="big-heart">💖</div>
      <h2>ვიცოდიი! 🎉</h2>
      <p class="confirm-sub">ახლა მოდი ერთად დავგეგმოთ ეს პაემანი. აირჩიე ადგილი, თარიღი და საათი 💕</p>

      <form class="planner" id="dateForm">
        <!-- LOCATION -->
        <div class="planner-section">
          <div class="section-title">📍 აირჩიე ლოკაცია</div>
          <div class="location-grid" id="locationGrid">
            <button class="location-btn" type="button" data-location="მაკდონალდსი">
              <span class="loc-icon">🏛️</span>
              <span class="loc-label">მაკდონალდსი</span>
            </button>
            <button class="location-btn" type="button" data-location="KFC">
              <span class="loc-icon">🏘️</span>
              <span class="loc-label">KFC</span>
            </button>
            <button class="location-btn" type="button" data-location="დანქინ დონატსი">
              <span class="loc-icon">🏪</span>
              <span class="loc-label">დანქინი</span>
            </button>
            <button class="location-btn" type="button" data-location="მთაწმინდის პარკი">
              <span class="loc-icon">🌳</span>
              <span class="loc-label">მთაწმინდა</span>
            </button>
            <button class="location-btn" type="button" data-location="კინო / თეატრი">
              <span class="loc-icon">🎭</span>
              <span class="loc-label">კინო / თეატრი</span>
            </button>
            <button class="location-btn" type="button" data-location="კაფე / რესტორანი">
              <span class="loc-icon">☕</span>
              <span class="loc-label">კაფე / რესტორანი</span>
            </button>
          </div>
        </div>

        <!-- DATE & TIME -->
        <div class="planner-section">
          <div class="section-title">📅⏰ აირჩიე თარიღი და საათი</div>
          <div class="dt-row">
            <div class="dt-field">
              <label for="dateInput">თარიღი</label>
              <input class="dt-input" id="dateInput" type="date" required />
            </div>
            <div class="dt-field">
              <label for="timeInput">საათი</label>
              <input class="dt-input" id="timeInput" type="time" min="09:00" max="23:59" step="900" required />
            </div>
          </div>
        </div>

        <!-- SAVE -->
        <button class="save-btn" id="saveBtn" type="submit">💌 პაემნის დაგეგმვა</button>
        <div class="status-text" id="statusText"></div>
      </form>

      <!-- SUCCESS BOX -->
      <div class="success-box" id="successBox">
        <div class="tick">✅</div>
        <div class="saved-note" id="savedNote"></div>
      </div>
      <div class="celebration-gif" id="celebrationGif" aria-hidden="true"></div>
    </div>
  </section>

  <script>
    // ============================================================
    //  1. STARS
    // ============================================================
    const stars = document.getElementById("stars");
    for (let i = 0; i < 95; i++) {
      const s = document.createElement("span");
      s.className = "star";
      s.style.left = Math.random() * 100 + "%";
      s.style.top = Math.random() * 100 + "%";
      const sz = 1 + Math.random() * 2.2;
      s.style.width = sz + "px"; s.style.height = sz + "px";
      s.style.animationDelay = Math.random() * 4 + "s";
      s.style.animationDuration = 1.8 + Math.random() * 3 + "s";
      stars.appendChild(s);
    }

    const yesChoice = document.getElementById("yesChoice");
    const noChoice = document.getElementById("noChoice");
    const noLabel = document.getElementById("noLabel");
    const mainScreen = document.getElementById("mainScreen");
    const confirmation = document.getElementById("confirmation");
    const choicesArea = document.getElementById("choicesArea");
    const imageRow = document.getElementById("imageRow");
    const cuteMessage = document.getElementById("cuteMessage");
    const dateInput = document.getElementById("dateInput");
    const timeInput = document.getElementById("timeInput");
    const saveBtn = document.getElementById("saveBtn");
    const statusText = document.getElementById("statusText");
    const successBox = document.getElementById("successBox");
    const savedNote = document.getElementById("savedNote");
    const celebrationGif = document.getElementById("celebrationGif");

    let selectedLocation = "";
    const today = new Date();
    dateInput.min = today.toISOString().split("T")[0];

    // ===== Confetti =====
    const canvas = document.getElementById("confetti-canvas");
    const ctx = canvas.getContext("2d");
    let confetti = [], confettiAnim = null;
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    class Piece {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = -20 - Math.random() * canvas.height;
        this.sz = 5 + Math.random() * 8;
        this.vy = 2.5 + Math.random() * 4;
        this.vx = (Math.random() - 0.5) * 3;
        this.r = Math.random() * 360;
        this.rs = (Math.random() - 0.5) * 11;
        this.c = `hsl(${Math.random() * 360}, 92%, 68%)`;
        this.a = 1;
      }
      update() {
        this.y += this.vy; this.x += this.vx; this.r += this.rs; this.vy += 0.018;
        if (this.y > canvas.height + 30) this.a = 0;
      }
      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.r * Math.PI / 180);
        ctx.globalAlpha = this.a;
        ctx.fillStyle = this.c;
        ctx.fillRect(-this.sz / 2, -this.sz / 3, this.sz, this.sz * 0.66);
        ctx.restore();
      }
    }
    function launchConfetti() {
      confetti = [];
      for (let i = 0; i < 260; i++) confetti.push(new Piece());
      if (confettiAnim) cancelAnimationFrame(confettiAnim);
      anim();
    }
    function anim() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      confetti = confetti.filter(p => p.a > 0);
      confetti.forEach(p => { p.update(); p.draw(); });
      if (confetti.length) confettiAnim = requestAnimationFrame(anim);
      else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function burstHearts() {
      for (let i = 0; i < 22; i++) {
        const h = document.createElement("div");
        h.textContent = ["💖","💗","💕","💘","💞"][Math.floor(Math.random() * 5)];
        h.style.position = "fixed";
        h.style.left = 50 + (Math.random() - 0.5) * 22 + "%";
        h.style.top = "58%";
        h.style.zIndex = "30";
        h.style.fontSize = 22 + Math.random() * 18 + "px";
        h.style.pointerEvents = "none";
        h.style.transition = "transform 1.1s ease, opacity 1.1s ease";
        document.body.appendChild(h);
        requestAnimationFrame(() => {
          h.style.transform = `translate(${(Math.random() - 0.5) * 220}px, ${-120 - Math.random() * 180}px) rotate(${(Math.random() - 0.5) * 160}deg)`;
          h.style.opacity = "0";
        });
        setTimeout(() => h.remove(), 1200);
      }
    }

    // ===== SHOW CONFIRMATION =====
    function showConfirmation() {
      burstHearts();
      launchConfetti();
      mainScreen.classList.add("hidden");
      setTimeout(() => {
        mainScreen.style.display = "none";
        confirmation.style.display = "block";
      }, 380);
    }
    yesChoice.addEventListener("click", showConfirmation);
    yesChoice.addEventListener("touchstart", (e) => { e.preventDefault(); showConfirmation(); }, { passive: false });

    // ===== NO BUTTON RUNAWAY =====
    let noMoves = 0;
    const noTexts = ["არა", "დაფიქრდი", "კარგად დაფიქრდი", "აბა კი სცადე 🙂‍↕️"];
    const cutes = [
      "ჰმ... არა? 😌",
      "დაფიქრდი, იქნებ მაინც კი? 🤔",
      "კარგად დაფიქრდი, სანამ გაიქცევი 😅",
      "აბა კი სცადე, ნახე რა მოხდება 💖"
    ];

    function toAbs() {
      const ar = choicesArea.getBoundingClientRect();
      const nr = noChoice.getBoundingClientRect();
      if (!noChoice.classList.contains("running")) {
        noChoice.classList.add("running");
        noChoice.style.left = (nr.left - ar.left) + "px";
        noChoice.style.top = (nr.top - ar.top) + "px";
        imageRow.style.minHeight = nr.height + "px";
      }
    }
    function safePos() {
      const ar = choicesArea.getBoundingClientRect();
      const nr = noChoice.getBoundingClientRect();
      const yr = yesChoice.getBoundingClientRect();
      const pad = 8;
      const mx = Math.max(ar.width - nr.width - pad * 2, 1);
      const my = Math.max(ar.height - nr.height - pad * 2, 1);
      const yb = { l: yr.left - ar.left - 18, r: yr.right - ar.left + 18, t: yr.top - ar.top - 18, b: yr.bottom - ar.top + 18 };
      for (let i = 0; i < 35; i++) {
        const x = pad + Math.random() * mx, y = pad + Math.random() * my;
        const nb = { l: x, r: x + nr.width, t: y, b: y + nr.height };
        if (nb.r < yb.l || nb.l > yb.r || nb.b < yb.t || nb.t > yb.b) return { x, y };
      }
      return { x: pad + mx, y: pad + my };
    }
    function moveNo() {
      noMoves++;
      toAbs();
      const p = safePos();
      noChoice.style.left = p.x + "px"; noChoice.style.top = p.y + "px";
      noChoice.style.transform = `rotate(${(Math.random() - 0.5) * 18}deg) scale(${0.95 + Math.random() * 0.1})`;
      noLabel.textContent = noTexts[Math.min(noMoves - 1, noTexts.length - 1)];
      cuteMessage.textContent = cutes[Math.min(noMoves - 1, cutes.length - 1)];
      noChoice.classList.remove("tease"); void noChoice.offsetWidth; noChoice.classList.add("tease");
      if (noMoves >= 4) { yesChoice.style.transform = "scale(1.08)"; yesChoice.style.filter = "drop-shadow(0 18px 24px rgba(255, 47, 141, 0.34))"; }
    }
    noChoice.addEventListener("click", (e) => { e.preventDefault(); moveNo(); });
    noChoice.addEventListener("touchstart", (e) => { e.preventDefault(); moveNo(); }, { passive: false });
    noChoice.addEventListener("mouseenter", () => { if (window.matchMedia("(hover: hover)").matches) moveNo(); });

    // ===== LOCATION SELECTION =====
    document.querySelectorAll(".location-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".location-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedLocation = btn.dataset.location;
        statusText.textContent = "";
      });
    });

    // ===== SAVE TO LOCAL STORAGE + AUTO-SCROLL =====
    document.getElementById("dateForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!selectedLocation) { statusText.textContent = "💖 ჯერ ლოკაცია აირჩიე!"; return; }
      if (!dateInput.value || !timeInput.value) { statusText.textContent = "🥹 თარიღი და საათიც აირჩიე!"; return; }

      const plan = {
        location: selectedLocation,
        date: dateInput.value,
        time: timeInput.value,
        savedAt: new Date().toLocaleString("ka-GE", { timeZone: "Asia/Tbilisi" })
      };
      localStorage.setItem("datePlan", JSON.stringify(plan));

      const dateFormatted = new Date(dateInput.value + "T" + timeInput.value);
      const options = { year: "numeric", month: "long", day: "numeric", timeZone: "Asia/Tbilisi" };
      const georgianDate = dateFormatted.toLocaleDateString("ka-GE", options);
      const hours = dateFormatted.getHours().toString().padStart(2, "0");
      const mins = dateFormatted.getMinutes().toString().padStart(2, "0");

      saveBtn.disabled = true;
      saveBtn.textContent = "✅ შენახულია!";
      statusText.textContent = "";
      successBox.style.display = "block";
      savedNote.innerHTML = `
        🎯 <span>${selectedLocation}</span><br />
        📅 <span>${georgianDate}</span><br />
        ⏰ <span>${hours}:${mins}</span><br /><br />
        💾 შენახულია ${plan.savedAt}
      `;
      celebrationGif.style.display = "block";
      launchConfetti();

      // Auto-scroll down to show the saved result
      setTimeout(() => {
        const card = confirmation.querySelector('.card');
        if (card) {
          card.scrollTo({ top: card.scrollHeight, behavior: 'smooth' });
        }
      }, 400);
    });

    // ===== PRE-FILL FROM LOCALSTORAGE =====
    (function loadSaved() {
      const saved = localStorage.getItem("datePlan");
      if (saved) {
        try {
          const p = JSON.parse(saved);
          document.querySelectorAll(".location-btn").forEach(b => {
            if (b.dataset.location === p.location) b.classList.add("selected");
          });
          selectedLocation = p.location || "";
          dateInput.value = p.date || "";
          timeInput.value = p.time || "";
        } catch (e) {}
      }
    })();
  </script>
</body>
</html>
