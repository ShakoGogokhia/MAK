<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>პაემანი? 💖</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --pink: #ff5fa2;
      --hot-pink: #ff2f8d;
      --soft-pink: #ffd5e8;
      --purple: #6d3bff;
      --dark: #12071f;
      --glass: rgba(255, 255, 255, 0.12);
      --border: rgba(255, 255, 255, 0.22);
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.38);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      font-family: "Noto Sans Georgian", system-ui, sans-serif;
      background:
        radial-gradient(circle at 18% 12%, rgba(255, 95, 162, 0.38), transparent 28%),
        radial-gradient(circle at 84% 20%, rgba(109, 59, 255, 0.32), transparent 28%),
        radial-gradient(circle at 50% 92%, rgba(255, 193, 220, 0.18), transparent 32%),
        linear-gradient(145deg, #160720 0%, #281044 45%, #12071f 100%);
      color: white;
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .background-blobs,
    .stars,
    .bg-hearts,
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .background-blobs {
      display: none;
    }

    .blob {
      position: absolute;
      width: 190px;
      height: 190px;
      border-radius: 999px;
      opacity: 0.22;
      animation: blobFloat 9s ease-in-out infinite alternate;
    }

    .blob:nth-child(1) {
      left: -60px;
      top: 10%;
      background: #ff5fa2;
    }

    .blob:nth-child(2) {
      right: -70px;
      top: 18%;
      background: #9d72ff;
      animation-delay: 1.2s;
    }

    .blob:nth-child(3) {
      left: 28%;
      bottom: -90px;
      background: #ffcae0;
      animation-delay: 2s;
    }

    @keyframes blobFloat {
      from { transform: translate3d(0, 0, 0) scale(1); }
      to { transform: translate3d(22px, -28px, 0) scale(1.12); }
    }

    .stars {
      z-index: 0;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 999px;
      animation: twinkle 2.8s ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.18; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1.6); }
    }

    .bg-hearts {
      z-index: 0;
      overflow: hidden;
    }

    .bg-heart {
      position: absolute;
      bottom: -60px;
      font-size: clamp(16px, 4vw, 26px);
      opacity: 0;
      animation: floatHeart linear infinite;
      filter: drop-shadow(0 0 12px rgba(255, 95, 162, 0.5));
    }

    .bg-heart:nth-child(1) { left: 6%; animation-duration: 9s; animation-delay: 0s; }
    .bg-heart:nth-child(2) { left: 18%; animation-duration: 11s; animation-delay: 1s; }
    .bg-heart:nth-child(3) { left: 31%; animation-duration: 8s; animation-delay: 2.2s; }
    .bg-heart:nth-child(4) { left: 43%; animation-duration: 10s; animation-delay: 0.6s; }
    .bg-heart:nth-child(5) { left: 57%; animation-duration: 12s; animation-delay: 1.7s; }
    .bg-heart:nth-child(6) { left: 70%; animation-duration: 8.5s; animation-delay: 2.7s; }
    .bg-heart:nth-child(7) { left: 82%; animation-duration: 10.5s; animation-delay: 1.3s; }
    .bg-heart:nth-child(8) { left: 92%; animation-duration: 9.5s; animation-delay: 3s; }

    @keyframes floatHeart {
      0% { transform: translateY(0) rotate(0deg) scale(0.55); opacity: 0; }
      16% { opacity: 0.72; }
      84% { opacity: 0.72; }
      100% { transform: translateY(-112vh) rotate(540deg) scale(1.18); opacity: 0; }
    }

    #confetti-canvas {
      z-index: 20;
    }

    .screen {
      position: relative;
      z-index: 2;
      width: min(100%, 440px);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }

    .screen.hidden {
      opacity: 0;
      transform: scale(0.92) translateY(16px);
      pointer-events: none;
    }

    .card {
      position: relative;
      width: 100%;
      max-height: calc(100svh - 28px);
      overflow: auto;
      padding: 22px 18px 18px;
      text-align: center;
      border: 1px solid var(--border);
      border-radius: 34px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.08)),
        rgba(255, 255, 255, 0.08);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      pointer-events: none;
    }

    h1 {
      font-size: clamp(25px, 7vw, 38px);
      line-height: 1.25;
      font-weight: 800;
      letter-spacing: -0.5px;
      text-shadow: 0 12px 34px rgba(0, 0, 0, 0.5);
      animation: fadeDown 0.75s 0.07s ease both;
    }

    .name-glow {
      color: var(--soft-pink);
      text-shadow: 0 0 22px rgba(255, 95, 162, 0.95), 0 0 52px rgba(255, 47, 141, 0.65);
      animation: glow 1.7s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { filter: drop-shadow(0 0 3px rgba(255, 95, 162, 0.45)); }
      to { filter: drop-shadow(0 0 18px rgba(255, 95, 162, 0.95)); }
    }

    .subtitle {
      margin: 10px auto 16px;
      max-width: 310px;
      color: rgba(255, 255, 255, 0.68);
      font-size: clamp(13px, 3.4vw, 15px);
      line-height: 1.6;
      animation: fadeDown 0.75s 0.14s ease both;
    }

    .photo-frame {
      position: relative;
      width: min(100%, 330px);
      aspect-ratio: 1.45 / 1;
      margin: 0 auto 16px;
      padding: 8px;
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.28), rgba(255, 95, 162, 0.12));
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.32), 0 0 44px rgba(255, 95, 162, 0.16);
      animation: popIn 0.8s 0.2s cubic-bezier(.2, .9, .2, 1.25) both, floatSmall 3.2s ease-in-out infinite;
    }

    .main-photo {
      width: 100%;
      height: 100%;
      border-radius: 22px;
      background: url("720552435_2150396695503480_1052200278410007004_n.png") center / contain no-repeat;
      background-color: rgba(0,0,0,0.08);
    }

    .photo-sticker {
      position: absolute;
      right: -10px;
      top: -12px;
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: linear-gradient(135deg, #fff, #ffd6e8);
      color: #ff2f8d;
      font-size: 26px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.24);
      animation: stickerWiggle 1.8s ease-in-out infinite;
    }

    @keyframes stickerWiggle {
      0%, 100% { transform: rotate(-8deg) scale(1); }
      50% { transform: rotate(8deg) scale(1.08); }
    }

    .question-text {
      margin: 2px 0 12px;
      color: rgba(255, 255, 255, 0.82);
      font-size: 14px;
      font-weight: 600;
      animation: fadeDown 0.75s 0.29s ease both;
    }

    .choices-area {
      position: relative;
      width: 100%;
      min-height: 196px;
      animation: fadeUp 0.7s 0.34s ease both;
    }

    .image-row {
      position: relative;
      z-index: 3;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      width: 100%;
    }

    .answer-card {
      position: relative;
      width: min(42vw, 142px);
      max-width: 142px;
      padding: 0;
      border: 0;
      border-radius: 28px;
      background: transparent;
      box-shadow: none;
      cursor: pointer;
      touch-action: manipulation;
      transition:
        transform 0.22s ease,
        filter 0.22s ease,
        left 0.24s ease,
        top 0.24s ease;
      animation: floatSmall 3s ease-in-out infinite;
      -webkit-tap-highlight-color: transparent;
    }

    .answer-card::before {
      content: "";
      position: absolute;
      inset: 8px;
      z-index: -1;
      border-radius: 26px;
      background: rgba(255, 95, 162, 0.38);
      opacity: 0;
      filter: blur(18px);
      transition: opacity 0.22s ease;
    }

    .answer-card::after {
      display: none;
    }

    .answer-card:nth-child(2) {
      animation-delay: 0.6s;
    }

    .answer-card:active {
      transform: scale(0.92);
    }

    .answer-card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: block;
      object-fit: cover;
      border-radius: 21px;
      pointer-events: none;
      filter: drop-shadow(0 16px 24px rgba(0, 0, 0, 0.28));
    }

    .answer-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 74px;
      margin-top: 9px;
      padding: 8px 16px;
      border-radius: 999px;
      color: #fff;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 0.3px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      background: rgba(18, 7, 31, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      pointer-events: none;
    }

    #yesChoice .answer-label {
      background: linear-gradient(135deg, rgba(255, 120, 180, 0.92), rgba(255, 47, 141, 0.92));
    }

    #noChoice .answer-label {
      background: linear-gradient(135deg, rgba(125, 124, 255, 0.92), rgba(67, 32, 185, 0.92));
    }

    #yesChoice,
    #noChoice {
      box-shadow: none;
    }

    #noChoice.running {
      position: absolute;
      z-index: 10;
      animation: none;
    }

    #noChoice.tease {
      animation: noShake 0.36s ease both;
    }

    @keyframes noShake {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      25% { transform: translateX(-6px) rotate(-4deg); }
      50% { transform: translateX(6px) rotate(4deg); }
      75% { transform: translateX(-4px) rotate(-2deg); }
    }

    @keyframes shine {
      0%, 58% { transform: translateX(-130%); }
      78%, 100% { transform: translateX(130%); }
    }

    @keyframes floatSmall {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }

    .tap-hint {
      color: rgba(255, 255, 255, 0.44);
      font-size: 11px;
      margin-top: 8px;
      line-height: 1.5;
      animation: fadeUp 0.7s 0.42s ease both;
    }

    .cute-message {
      min-height: 20px;
      margin-top: 8px;
      color: rgba(255, 213, 232, 0.9);
      font-size: 12px;
      font-weight: 700;
      animation: fadeUp 0.35s ease both;
    }

    .confirmation {
      display: none;
      z-index: 4;
      width: min(100%, 440px);
      animation: confirmAppear 0.72s cubic-bezier(.2, .9, .2, 1.25) both;
    }

    .confirmation .card {
      padding-top: 26px;
    }

    .big-heart {
      width: 92px;
      height: 92px;
      margin: 0 auto 12px;
      display: grid;
      place-items: center;
      border-radius: 32px;
      background: linear-gradient(135deg, #fff, #ffd1e5);
      color: #ff2f8d;
      font-size: 48px;
      box-shadow: 0 20px 50px rgba(255, 47, 141, 0.28);
      animation: heartBeat 0.9s ease-in-out infinite;
    }

    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      30% { transform: scale(1.12); }
      55% { transform: scale(0.98); }
    }

    .confirmation h2 {
      font-size: clamp(31px, 8vw, 46px);
      line-height: 1.15;
      font-weight: 800;
      text-shadow: 0 14px 36px rgba(0, 0, 0, 0.45);
    }

    .confirmation p {
      max-width: 330px;
      margin: 10px auto 14px;
      color: rgba(255, 255, 255, 0.72);
      font-size: 14px;
      line-height: 1.55;
    }

    .celebration-gif {
      width: min(100%, 320px);
      aspect-ratio: 1.6 / 1;
      margin: 0 auto 16px;
      border-radius: 28px;
      background: url("https://media1.tenor.com/m/2VprHA868S8AAAAC/yummy-desserts-desserts-milk-mocha.gif") center / cover no-repeat;
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.32);
    }

    .love-meter {
      width: min(100%, 320px);
      margin: 0 auto 16px;
      padding: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .love-meter-bar {
      height: 17px;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff78b4, #ff2f8d, #c920ff);
      box-shadow: 0 0 24px rgba(255, 47, 141, 0.55);
      animation: fillLove 1.4s 0.4s ease forwards;
    }

    @keyframes fillLove {
      to { width: 100%; }
    }

    #fix-date {
      border: none;
      width: min(100%, 310px);
      padding: 16px 22px;
      border-radius: 999px;
      font-family: inherit;
      font-size: 17px;
      font-weight: 800;
      color: white;
      background: linear-gradient(135deg, #25d366, #128c7e);
      box-shadow: 0 16px 34px rgba(37, 211, 102, 0.28);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    #fix-date:active {
      transform: scale(0.94);
      box-shadow: 0 18px 42px rgba(37, 211, 102, 0.42);
    }

    .whatsapp-note {
      margin: 12px 0 0 !important;
      color: rgba(255, 255, 255, 0.42) !important;
      font-size: 12px !important;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.84); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes confirmAppear {
      from { opacity: 0; transform: scale(0.82) translateY(18px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @media (max-width: 390px) {
      body { padding: 12px; }
      .card { border-radius: 28px; padding: 18px 14px 15px; }
      .photo-frame { border-radius: 24px; }
      .main-photo { border-radius: 18px; }
      .choices-area { min-height: 150px; }
      .image-row { gap: 10px; }
      .answer-card { width: min(42vw, 126px); border-radius: 22px; padding: 0; }
      .answer-card img { border-radius: 17px; }
      .answer-label { margin-top: 7px; padding: 7px 14px; font-size: 13px; }
    }

    @media (max-height: 700px) {
      .card { padding-top: 16px; }
      .subtitle { margin-bottom: 10px; }
      .photo-frame { width: min(100%, 270px); margin-bottom: 10px; }
      .choices-area { min-height: 135px; }
      .answer-card { width: min(38vw, 116px); }
      .tap-hint { display: none; }
      .big-heart { width: 74px; height: 74px; font-size: 40px; margin-bottom: 8px; }
      .celebration-gif { width: min(100%, 270px); margin-bottom: 12px; }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars" aria-hidden="true"></div>

  <div class="bg-hearts" aria-hidden="true">
    <span class="bg-heart">💖</span>
    <span class="bg-heart">💗</span>
    <span class="bg-heart">💕</span>
    <span class="bg-heart">💘</span>
    <span class="bg-heart">💞</span>
    <span class="bg-heart">💖</span>
    <span class="bg-heart">💗</span>
    <span class="bg-heart">💕</span>
  </div>

  <canvas id="confetti-canvas"></canvas>

  <main class="screen" id="mainScreen">
    <section class="card">
      <h1>
        <span class="name-glow">მაკუნა</span>,<br />
        წამოხვალ ჩემთან პაემანზე? 💫
      </h1>

      <p class="subtitle">
        მხოლოდ ერთი სწორი პასუხია... მაგრამ მაინც გაძლევ არჩევანს 😌💖
      </p>

      <div class="photo-frame">
        <div class="main-photo" role="img" aria-label="cute image"></div>
        <div class="photo-sticker">💌</div>
      </div>

      <p class="question-text">რას მიპასუხებ? 🥹</p>

      <div class="choices-area" id="choicesArea">
        <div class="image-row" id="imageRow">
          <button class="answer-card" id="yesChoice" type="button" aria-label="კი">
            <img src="ki.jpg" alt="კი" />
            <span class="answer-label">კი</span>
          </button>

          <button class="answer-card" id="noChoice" type="button" aria-label="არა">
            <img src="ara.jpg" alt="არა" />
            <span class="answer-label" id="noLabel">არა</span>
          </button>
        </div>
      </div>

      
    </section>
  </main>

  <section class="confirmation" id="confirmation">
    <div class="card">
      <div class="big-heart">💖</div>
      <h2>ვიცოდიი! 🎉</h2>
      <p>ძალიან გამახარეე 😍 ახლა უკვე პაემნის დღე უნდა დავნიშნოთ.</p>

      <div class="celebration-gif" aria-hidden="true"></div>

      <div class="love-meter" aria-label="love meter">
        <div class="love-meter-bar"></div>
      </div>

   
    </div>
  </section>

  <script>
    // ===== Stars =====
    const stars = document.getElementById("stars");
    for (let i = 0; i < 95; i++) {
      const star = document.createElement("span");
      star.className = "star";
      star.style.left = Math.random() * 100 + "%";
      star.style.top = Math.random() * 100 + "%";
      const size = 1 + Math.random() * 2.2;
      star.style.width = size + "px";
      star.style.height = size + "px";
      star.style.animationDelay = Math.random() * 4 + "s";
      star.style.animationDuration = 1.8 + Math.random() * 3 + "s";
      stars.appendChild(star);
    }

    // ===== Elements =====
    const yesChoice = document.getElementById("yesChoice");
    const noChoice = document.getElementById("noChoice");
    const noLabel = document.getElementById("noLabel");
    const mainScreen = document.getElementById("mainScreen");
    const confirmation = document.getElementById("confirmation");
    const choicesArea = document.getElementById("choicesArea");
    const imageRow = document.getElementById("imageRow");
    const cuteMessage = document.getElementById("cuteMessage");

    // ===== Confetti =====
    const canvas = document.getElementById("confetti-canvas");
    const ctx = canvas.getContext("2d");
    let confetti = [];
    let confettiAnimation = null;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    class ConfettiPiece {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = -20 - Math.random() * canvas.height;
        this.size = 5 + Math.random() * 8;
        this.speedY = 2.5 + Math.random() * 4;
        this.speedX = (Math.random() - 0.5) * 3;
        this.rotation = Math.random() * 360;
        this.rotationSpeed = (Math.random() - 0.5) * 11;
        this.color = `hsl(${Math.random() * 360}, 92%, 68%)`;
        this.alpha = 1;
      }

      update() {
        this.y += this.speedY;
        this.x += this.speedX;
        this.rotation += this.rotationSpeed;
        this.speedY += 0.018;
        if (this.y > canvas.height + 30) this.alpha = 0;
      }

      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate((this.rotation * Math.PI) / 180);
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        ctx.fillRect(-this.size / 2, -this.size / 3, this.size, this.size * 0.66);
        ctx.restore();
      }
    }

    function launchConfetti() {
      confetti = [];
      for (let i = 0; i < 260; i++) confetti.push(new ConfettiPiece());
      if (confettiAnimation) cancelAnimationFrame(confettiAnimation);
      animateConfetti();
    }

    function animateConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      confetti = confetti.filter((piece) => piece.alpha > 0);
      confetti.forEach((piece) => {
        piece.update();
        piece.draw();
      });

      if (confetti.length) {
        confettiAnimation = requestAnimationFrame(animateConfetti);
      } else {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
    }

    // ===== Cute floating hearts on YES =====
    function burstHearts() {
      for (let i = 0; i < 22; i++) {
        const heart = document.createElement("div");
        heart.textContent = ["💖", "💗", "💕", "💘", "💞"][Math.floor(Math.random() * 5)];
        heart.style.position = "fixed";
        heart.style.left = 50 + (Math.random() - 0.5) * 22 + "%";
        heart.style.top = "58%";
        heart.style.zIndex = "30";
        heart.style.fontSize = 22 + Math.random() * 18 + "px";
        heart.style.pointerEvents = "none";
        heart.style.transition = "transform 1.1s ease, opacity 1.1s ease";
        document.body.appendChild(heart);

        requestAnimationFrame(() => {
          heart.style.transform = `translate(${(Math.random() - 0.5) * 220}px, ${-120 - Math.random() * 180}px) rotate(${(Math.random() - 0.5) * 160}deg)`;
          heart.style.opacity = "0";
        });

        setTimeout(() => heart.remove(), 1200);
      }
    }

    function showConfirmation() {
      burstHearts();
      launchConfetti();
      mainScreen.classList.add("hidden");

      setTimeout(() => {
        mainScreen.style.display = "none";
        confirmation.style.display = "block";
      }, 380);
    }

    // YES image click
    yesChoice.addEventListener("click", showConfirmation);
    yesChoice.addEventListener("touchstart", (event) => {
      event.preventDefault();
      showConfirmation();
    }, { passive: false });

    // ===== NO image runs away =====
    let noMoves = 0;
    const noTexts = [
      "არა",
      "მართლა? 🥺",
      "კაი რაა 😭",
      "დაფიქრდი 💔",
      "ბოლო შანსი 😅",
      "კი ჯობია 💖"
    ];

    function setNoMessage() {
      cuteMessage.textContent = [
        "არა ასე მარტივად არ იმუშავებს 😌",
        "აუ კაი რაა, კი დააჭირე 🥹",
        "არა გაიქცა უკვე 😂",
        "გული მიგრძნობს, კი გინდა 💖",
        "მოდი, სწორ პასუხზე გადადი 😅"
      ][Math.min(noMoves - 1, 4)];
    }

    function moveNoImage() {
      noMoves++;

      const areaRect = choicesArea.getBoundingClientRect();
      const noRect = noChoice.getBoundingClientRect();
      const rowRect = imageRow.getBoundingClientRect();

      // Convert current normal position to absolute position the first time.
      if (!noChoice.classList.contains("running")) {
        const startLeft = noRect.left - areaRect.left;
        const startTop = noRect.top - areaRect.top;
        noChoice.classList.add("running");
        noChoice.style.left = startLeft + "px";
        noChoice.style.top = startTop + "px";
        imageRow.style.minHeight = rowRect.height + "px";
      }

      const padding = 6;
      const maxX = Math.max(areaRect.width - noRect.width - padding * 2, 1);
      const maxY = Math.max(areaRect.height - noRect.height - padding * 2, 1);

      let newX = padding + Math.random() * maxX;
      let newY = padding + Math.random() * maxY;

      // Keep it away from the YES image area as much as possible.
      const yesRect = yesChoice.getBoundingClientRect();
      const yesX = yesRect.left - areaRect.left;
      const yesY = yesRect.top - areaRect.top;
      if (Math.abs(newX - yesX) < noRect.width * 0.9 && Math.abs(newY - yesY) < noRect.height * 0.8) {
        newX = Math.min(maxX, yesX + noRect.width + 16);
        if (newX > maxX - 10) newX = padding;
      }

      noChoice.style.left = newX + "px";
      noChoice.style.top = newY + "px";
      noChoice.style.transform = `rotate(${(Math.random() - 0.5) * 18}deg) scale(${0.95 + Math.random() * 0.1})`;

      noLabel.textContent = noTexts[Math.min(noMoves, noTexts.length - 1)];
      setNoMessage();

      noChoice.classList.remove("tease");
      void noChoice.offsetWidth;
      noChoice.classList.add("tease");

      // After many tries, make YES a little bigger/cuter.
      if (noMoves >= 4) {
        yesChoice.style.transform = "scale(1.08)";
        yesChoice.style.filter = "drop-shadow(0 18px 24px rgba(255, 47, 141, 0.34))";
      }
    }

    noChoice.addEventListener("click", (event) => {
      event.preventDefault();
      moveNoImage();
    });

    noChoice.addEventListener("touchstart", (event) => {
      event.preventDefault();
      moveNoImage();
    }, { passive: false });

    // Desktop support too.
    noChoice.addEventListener("mouseenter", () => {
      if (window.matchMedia("(hover: hover)").matches) moveNoImage();
    });

    // ===== WhatsApp =====
    document.getElementById("fix-date").addEventListener("click", () => {
      const phoneNumber = "918802130983"; // change this to your number without + or spaces
      const text = encodeURIComponent("მაკუნა, მზად ვარ პაემანზე! 😍🎉");
      window.location.href = `https://wa.me/${phoneNumber}?text=${text}`;
    });
  </script>
</body>
</html>
